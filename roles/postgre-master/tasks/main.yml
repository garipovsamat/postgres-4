---
- name: Update package list
  apt:
    update_cache: true
  become: true

- name: Install psycopg2
  package:
    name: python3-psycopg2
    state: present
  become: true

- name: Install PostgreSQL 16
  apt:
    name:
      - postgresql-16
      - postgresql-client-16
      - postgresql-contrib
    state: present
  become: true

- name: Create data directory
  file:
    path: /pg_data/16
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'
  become: true

- name: Stop default instance
  systemd:
    name: postgresql
    state: stopped
  become: true
  ignore_errors: true

- name: Initialize cluster in custom directory
  command:
    cmd: /usr/lib/postgresql/16/bin/initdb -D /pg_data/16 -U postgres
  become_user: postgres
  become: true
  args:
    creates: /pg_data/16/PG_VERSION

- name: Configure logging and pg_stat_statements in custom config
  blockinfile:
    path: /pg_data/16/postgresql.conf
    marker: "# {mark} ANSIBLE MANAGED"
    block: |
      # Логирование всех запросов
      log_statement = 'all'
      log_min_duration_statement = 0
      log_line_prefix = '%t [%p]: '
      
      # pg_stat_statements
      shared_preload_libraries = 'pg_stat_statements'
      pg_stat_statements.max = 10000
      pg_stat_statements.track = all
  become: true
  notify: restart postgresql

- name: Start PostgreSQL
  systemd:
    name: postgresql
    state: started
    enabled: true
  become: true

- name: Create test user
  postgresql_user:
    name: pgbench
    password: "12345678"
    role_attr_flags: LOGIN
  become_user: postgres
  become: true

- name: Create test database
  postgresql_db:
    name: bench
    owner: pgbench
  become_user: postgres
  become: true

- name: Enable extensions in test database
  postgresql_ext:
    db: bench
    name: "{{ item }}"
  become_user: postgres
  become: true
  loop:
    - pg_stat_statements
    - pgcrypto
    - hstore
    - dblink

- name: Create replication user
  postgresql_user:
    name: pg-replica
    password: "12345678"
    role_attr_flags: LOGIN,REPLICATION
  become_user: postgres
  become: true

- name: Allow replication in pg_hba.conf
  lineinfile:
    path: /pg_data/16/pg_hba.conf
    line: "host    replication     pg-replica     192.168.88.0/24         scram-sha-256"
    insertafter: EOF
  become: true
  notify: restart postgresql

- name: Initialize pgbench
  command:
    cmd: pgbench -i -s 50 bench
  become_user: postgres
  become: true
  environment:
    PGPASSWORD: "12345678"

- name: Run pgbench test
  command:
    cmd: pgbench -c 10 -j 2 -t 1000 bench
  become_user: postgres
  become: true
  environment:
    PGPASSWORD: "12345678"
  register: bench_out

- name: Save pgbench results
  copy:
    content: "{{ bench_out.stdout }}"
    dest: /tmp/pgbench_result.txt
    mode: '0644'
  become: true
  when: bench_out.stdout is defined

- name: Collect slow queries
  shell: |
    psql -U postgres -d bench -c "
    SELECT query, mean_exec_time, calls
    FROM pg_stat_statements
    ORDER BY mean_exec_time DESC
    LIMIT 10;" > /tmp/slow_queries.txt
  become_user: postgres
  become: true
  changed_when: false

- name: Collect IO queries
  shell: |
    psql -U postgres -d bench -c "
    SELECT query, blk_write_time
    FROM pg_stat_statements
    WHERE blk_write_time > 0
    ORDER BY blk_write_time DESC
    LIMIT 10;" > /tmp/io_queries.txt
  become_user: postgres
  become: true
  changed_when: false